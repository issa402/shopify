name : Pokemon Health System Check



# 1. Trigger on push, PR, and manual trigger
on: #what triggers the scripts
  push:
    branches: [ main, master ] # whenever code is uploaded 
  pull_request:
    branches: [ main, master ] #whenever it is merged
  workflow_dispatch: #adds a button so u can run it manually

jobs: # container for steps below
  health-check: #unique id for specific job
    runs-on: ubuntu-latest #tells github to use a fresh linux virtual amchines

    # 2. Provide Postgres + Redis (Service Containers)
    services: #helper tools form dockercompose.yml
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pokemongo
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Set health checks to wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps: # sequence f commands to execute
      # 3. Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4 #clones our code to virtual machine

      # 4. Set up Go
      - name: Set up Go
        uses: actions/setup-go@v5 #install the Go programming lanaguage
        with:
          go-version: '1.21'

      # 5. Set env vars & Start the Server
      - name: Start Pokemon Go Server
        run: |
          export DB_HOST=localhost
          export DB_PORT=5432
          export REDIS_HOST=localhost
          # Add other env vars from dev-startup.sh
          go run main.go & 
          # The '&' runs it in the background
          
      # 6. Poll /health
      - name: Check Health
        run: |
          # Wait for server to start
          sleep 5 
          # Curl the health endpoint
          curl --fail http://localhost:8080/health || (echo "Server failed to start!" && exit 1)

      # 7. Print logs if it fails (using step security context)
      - name: Get Logs on Failure
        if: failure()
        run: |
          echo "Server logs:"
          # Add command to print logs if your app writes them to a file
